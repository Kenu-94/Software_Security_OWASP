name: "Repo checks"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Check Markdown
        run: markdownlint "**/*.md"

      - name: Check YAML syntax
        run: python -c "import yaml,glob; [yaml.safe_load(open(f, encoding='utf-8')) for f in glob.glob('**/*.yml', recursive=True)]"

      - name: Check JSON syntax
        run: python -c "import json,glob; [json.load(open(f, encoding='utf-8')) for f in glob.glob('**/*.json', recursive=True)]"

      - name: Check HTML presence
        run: test -f 404.html
