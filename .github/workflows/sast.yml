name: "Security-Scan"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 1 * * 5'

jobs:
  # 1. SAST Job: Analyseert de broncode op kwetsbaarheden (Exercise 2)
  sast:
    name: SAST Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ruby
          # 'security-extended' vindt meer kritieke lekken in Juice-Shop
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # upload: true zorgt dat resultaten de build-status beïnvloeden
          upload: true

  # 2. SCA Job: Controleert dependencies op bekende lekken (Exercise 3)
  sca:
    name: SCA Scan (Dependency Review)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ github.event.pull_request.base.sha || github.event.before }}
          head-ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fail-on-severity: high

  # 3. Secret Scanning Job: Zoekt naar hardcoded API keys/secrets (Exercise 4)
  secrets:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  # 4. DAST Job: Scant de draaiende applicatie (Exercise 5)
  dast:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Juice-Shop
        run: |
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          # Wacht tot de server bereikbaar is
          timeout 60s sh -c 'until curl -s http://localhost:3000; do sleep 5; done'

      - name: Run ZAP Baseline Scan
        # Zonder '|| [ $? -ne 0 ]' blokkeert dit de build bij alerts[cite: 2]
        run: |
          docker run --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
          -t http://localhost:3000/
