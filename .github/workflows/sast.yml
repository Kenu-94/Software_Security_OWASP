name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 18 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Alleen javascript-typescript om de Ruby-fout te voorkomen
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Geüpdatet naar v4 voor stabiliteit

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3 # Geüpdatet naar v3
      with:
        languages: ${{ matrix.language }}
        # Gebruik 'security-extended' om de Juice Shop lekken goed te vangen
        queries: security-extended

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3 # Geüpdatet naar v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3 # Geüpdatet naar v3
      with:
        category: "/language:${{ matrix.language }}"
        # Dit zorgt voor de upload naar het security dashboard
        upload: true
