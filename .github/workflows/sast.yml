name: "Security-Scan"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 1 * * 5'

jobs:
  sast:
    name: SAST Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # We halen alles op om te voorkomen dat CodeQL bestanden mist
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # We voegen 'ruby' weer toe omdat Juice-Shop soms Ruby-gebaseerde tools bevat
          languages: javascript-typescript, ruby
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # Dit is cruciaal om de job te laten falen bij kwetsbaarheden
          upload: true
